      # First-boot only: creates an admin user + tenant on startup, then remove these.
      BOOTSTRAP_EMAIL: admin@example.com
      BOOTSTRAP_PASSWORD: changeme123
      BOOTSTRAP_TENANT: myorg
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
      minio:
        condition: service_started
      bun-executor:
        condition: service_started
      python-executor:
        condition: service_started
    restart: unless-stopped

  mcp-server:
    build:
      context: ./services/mcp-server
    ports:
      - "8090:8090"
    environment:
      CONTROL_PLANE_URL: http://control-plane:8080
      PORT: "8090"
    depends_on:
      control-plane:
        condition: service_started
    restart: unless-stopped

  embed-dashboard:
    build:
      context: ./apps/embed-dashboard
    ports:
      - "8091:80"
    depends_on:
      control-plane:
        condition: service_started
    restart: unless-stopped

  admin:
    build:
      context: ./apps/admin
    ports:
      - "8092:80"
    depends_on:
      control-plane:
        condition: service_started
    restart: unless-stopped

  # NOTE: apps/web-ide has been retired. Its functionality (snippet editor) has been
  # merged into apps/admin. The directory is kept for git history but is not built
  # or served from docker-compose.

volumes:
  postgres_data:
  minio_data:
